services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-base-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blog_base
      POSTGRES_USER: blog_base
      POSTGRES_PASSWORD: blog_base
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_base -d blog_base"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
